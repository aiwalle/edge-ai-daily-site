<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>端智能日报</title>
  <style>
:root{
  --bg:#f4faf8;
  --surface:#ffffff;
  --surface-soft:#f8fcfb;
  --text:#1f2f2b;
  --muted:#5e726b;
  --accent:#0f766e;
  --accent-soft:#dcf2ee;
  --border:#d8e8e2;
}
*{box-sizing:border-box}
body{
  margin:0;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 0%, #e9f7f2 0%, transparent 35%),
    radial-gradient(circle at 90% 10%, #e5f4ef 0%, transparent 28%),
    var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  line-height:1.8;
}
.wrap{max-width:960px;margin:0 auto;padding:28px 18px 56px}
.top{
  margin-bottom:22px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
}
.brand{
  margin:0;
  font-size:14px;
  letter-spacing:.08em;
  color:var(--muted);
  text-transform:uppercase;
}
.back{
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 28px 20px;
  box-shadow:0 10px 30px rgba(15,118,110,.08);
}
h1,h2,h3{line-height:1.35;margin:1.1em 0 .45em}
h1{font-size:2rem;margin-top:.15em}
h2{font-size:1.32rem}
h3{font-size:1.08rem}
p,li{font-size:1rem}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
blockquote{
  margin:1rem 0;
  padding:.72rem .95rem;
  background:var(--surface-soft);
  border-left:4px solid var(--accent);
  color:#28433d;
  border-radius:8px;
}
hr{
  border:none;
  border-top:1px dashed var(--border);
  margin:1.3rem 0;
}
code{
  background:#eef7f5;
  border:1px solid #d7e9e4;
  color:#1f4f49;
  border-radius:6px;
  padding:.14em .42em;
  font-size:.92em;
}
pre{
  background:#0f1f1d;
  color:#e9f4f2;
  border-radius:12px;
  overflow:auto;
  padding:14px;
}
pre code{
  background:transparent;
  border:none;
  color:inherit;
  padding:0;
}
table{
  width:100%;
  border-collapse:collapse;
  margin:1rem 0;
  overflow:hidden;
  border-radius:12px;
}
th,td{
  border:1px solid var(--border);
  padding:.6rem .7rem;
  text-align:left;
  vertical-align:top;
}
th{background:#edf8f5}
.footer{
  margin-top:20px;
  color:var(--muted);
  font-size:.88rem;
}
.list{
  list-style:none;
  margin:1rem 0 0;
  padding:0;
  display:grid;
  gap:12px;
}
.list a.item{
  display:block;
  padding:14px 15px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--surface-soft);
  transition:.15s ease;
}
.list a.item:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(15,118,110,.09);
  text-decoration:none;
}
.date{
  display:block;
  color:var(--muted);
  font-size:.88rem;
  margin-bottom:2px;
}
@media (max-width:700px){
  .wrap{padding:20px 12px 40px}
  .card{padding:20px 16px 16px;border-radius:14px}
  h1{font-size:1.62rem}
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <p class="brand">Edge AI Daily</p>
      
    </div>
    <article class="card">
      
<h1>端智能日报</h1>
<blockquote>每日自动汇总端智能方向关键动态，含来源、摘要与值得关注的原因。</blockquote>
<ul class="list">
  <li><a class="item" href="news/2026-04-20.html"><span class="date">2026-04-20</span>端智能日报 2026-04-20</a></li>
</ul>
<p class="footer">由私有仓库自动构建并发布。</p>

    </article>
  </div>
</body>
</html>
